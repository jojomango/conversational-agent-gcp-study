<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>Bank AI — D16 多輪對話</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: sans-serif;
        background: #f0f2f5;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ── 登入頁 ── */
      #page-login {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
        padding: 48px 40px;
        width: 360px;
        text-align: center;
      }
      #page-login h1 {
        font-size: 1.4rem;
        margin-bottom: 8px;
      }
      #page-login p {
        color: #666;
        font-size: 0.9rem;
        margin-bottom: 32px;
      }
      #btn-login {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
        font-size: 1rem;
        transition: background 0.15s;
      }
      #btn-login:hover {
        background: #f5f5f5;
      }
      #btn-login img {
        width: 20px;
        height: 20px;
      }
      #login-error {
        color: #c00;
        font-size: 0.85rem;
        margin-top: 12px;
        min-height: 1.2em;
      }

      /* ── 聊天頁 ── */
      #page-chat {
        display: none;
        flex-direction: column;
        width: 720px;
        height: 90vh;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
        overflow: hidden;
      }

      /* header */
      .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
        background: #1a73e8;
        color: #fff;
      }
      .chat-header .title {
        font-size: 1.05rem;
        font-weight: 600;
      }
      .chat-header .meta {
        font-size: 0.8rem;
        opacity: 0.85;
      }
      #btn-logout {
        padding: 6px 14px;
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 6px;
        background: transparent;
        color: #fff;
        cursor: pointer;
        font-size: 0.85rem;
      }
      #btn-logout:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      /* BFF URL bar */
      .url-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: #f8f9fa;
        border-bottom: 1px solid #e0e0e0;
        font-size: 0.82rem;
        color: #555;
      }
      .url-bar input {
        flex: 1;
        padding: 4px 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 0.82rem;
      }

      /* messages */
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .msg {
        display: flex;
        gap: 10px;
        max-width: 85%;
      }
      .msg.user {
        align-self: flex-end;
        flex-direction: row-reverse;
      }
      .msg.agent {
        align-self: flex-start;
      }
      .bubble {
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 0.93rem;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .msg.user .bubble {
        background: #1a73e8;
        color: #fff;
        border-bottom-right-radius: 4px;
      }
      .msg.agent .bubble {
        background: #f1f3f4;
        color: #333;
        border-bottom-left-radius: 4px;
      }
      .msg.error .bubble {
        background: #fdecea;
        color: #c00;
      }
      .msg .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: bold;
        flex-shrink: 0;
        align-self: flex-end;
      }
      .msg.user .avatar {
        background: #1a73e8;
        color: #fff;
      }
      .msg.agent .avatar {
        background: #e8eaed;
        color: #555;
      }
      .msg.loading .bubble {
        color: #888;
        font-style: italic;
      }

      /* input row */
      .input-row {
        display: flex;
        gap: 8px;
        padding: 12px 16px;
        border-top: 1px solid #e0e0e0;
      }
      #question {
        flex: 1;
        resize: none;
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 0.95rem;
        font-family: inherit;
        line-height: 1.4;
      }
      #question:focus {
        outline: none;
        border-color: #1a73e8;
      }
      #btn-send {
        padding: 0 20px;
        background: #1a73e8;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.95rem;
        transition: background 0.15s;
      }
      #btn-send:hover:not(:disabled) {
        background: #1558b0;
      }
      #btn-send:disabled {
        background: #b0c4de;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <!-- ══════════ 登入頁 ══════════ -->
    <div id="page-login">
      <h1>🏦 Bank AI</h1>
      <p>OWASP 知識庫查詢助理</p>
      <button id="btn-login">
        <img
          src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
          alt="Google"
        />
        使用 Google 帳號登入
      </button>
      <div id="login-error"></div>
    </div>

    <!-- ══════════ 聊天頁 ══════════ -->
    <div id="page-chat">
      <div class="chat-header">
        <div>
          <div class="title">Bank AI — 資安知識助理</div>
          <div class="meta" id="user-meta"></div>
        </div>
        <button id="btn-logout">登出</button>
      </div>

      <div class="url-bar">
        BFF：<input id="bff-url" value="http://localhost:8080" />
      </div>

      <div id="messages"></div>

      <div class="input-row">
        <textarea
          id="question"
          rows="2"
          placeholder="輸入問題，按 Enter 送出（Shift+Enter 換行）"
        ></textarea>
        <button id="btn-send">送出</button>
      </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="config.js"></script>
    <script>
      firebase.initializeApp(window.FIREBASE_CONFIG);
      const auth = firebase.auth();
      const provider = new firebase.auth.GoogleAuthProvider();

      // ── State ──
      let sessionId = null; // 登入後產生，整個對話期間固定

      // ── 頁面切換 ──
      function showLogin() {
        document.getElementById("page-login").style.display = "";
        document.getElementById("page-chat").style.display = "none";
      }
      function showChat(user) {
        document.getElementById("page-login").style.display = "none";
        document.getElementById("page-chat").style.display = "flex";
        document.getElementById("user-meta").textContent =
          `${user.email}　Session: ${sessionId}`;
      }

      // ── UUID v4（原生，無需套件）──
      function newUUID() {
        return ([1e7] + -1e3 + -4e3 + -8e3 + -1e11).replace(/[018]/g, (c) =>
          (
            c ^
            (crypto.getRandomValues(new Uint8Array(1))[0] & (15 >> (c / 4)))
          ).toString(16),
        );
      }

      // ── Auth state ──
      auth.onAuthStateChanged((user) => {
        if (user) {
          if (!sessionId) sessionId = newUUID(); // 登入時產生，只產生一次
          showChat(user);
        } else {
          sessionId = null;
          showLogin();
        }
      });

      // ── 登入 ──
      document.getElementById("btn-login").addEventListener("click", () => {
        document.getElementById("login-error").textContent = "";
        auth.signInWithPopup(provider).catch((e) => {
          document.getElementById("login-error").textContent = e.message;
        });
      });

      // ── 登出 ──
      document.getElementById("btn-logout").addEventListener("click", () => {
        auth.signOut();
      });

      // ── 訊息泡泡 ──
      function appendMessage(role, text) {
        const msgs = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = `msg ${role}`;

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = role === "user" ? "我" : "AI";

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;

        div.appendChild(avatar);
        div.appendChild(bubble);
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
        return bubble; // 回傳以便更新 loading 狀態
      }

      // ── 送出問題 ──
      async function sendQuestion() {
        const questionEl = document.getElementById("question");
        const question = questionEl.value.trim();
        if (!question) return;

        const user = auth.currentUser;
        if (!user) {
          alert("請先登入");
          return;
        }

        const btnSend = document.getElementById("btn-send");
        btnSend.disabled = true;
        questionEl.value = "";

        appendMessage("user", question);
        const loadingBubble = appendMessage("loading", "⏳ 思考中…");

        const bffUrl = document
          .getElementById("bff-url")
          .value.replace(/\/$/, "");
        try {
          const token = await user.getIdToken(true);
          const res = await fetch(`${bffUrl}/query`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ question, session_id: sessionId }),
          });
          const data = await res.json();

          if (!res.ok) {
            loadingBubble.closest(".msg").className = "msg error";
            loadingBubble.textContent = `錯誤 ${res.status}：${data.detail ?? JSON.stringify(data)}`;
          } else {
            loadingBubble.closest(".msg").className = "msg agent";
            loadingBubble.textContent = data.answer || "（Agent 無回應）";
          }
        } catch (e) {
          loadingBubble.closest(".msg").className = "msg error";
          loadingBubble.textContent = `網路錯誤：${e.message}`;
        } finally {
          btnSend.disabled = false;
          questionEl.focus();
        }
      }

      document
        .getElementById("btn-send")
        .addEventListener("click", sendQuestion);
      document.getElementById("question").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey && !e.isComposing) {
          e.preventDefault();
          sendQuestion();
        }
      });
    </script>
  </body>
</html>
