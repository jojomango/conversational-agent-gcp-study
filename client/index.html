<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>Bank AI — D14 測試頁</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 640px;
        margin: 40px auto;
        padding: 0 16px;
      }
      button {
        padding: 8px 16px;
        margin: 4px 0;
        cursor: pointer;
      }
      textarea {
        width: 100%;
        height: 80px;
        margin: 4px 0;
      }
      pre {
        background: #f4f4f4;
        padding: 12px;
        border-radius: 4px;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .label {
        font-weight: bold;
        margin-top: 16px;
      }
      .ok {
        color: green;
      }
      .err {
        color: red;
      }
    </style>
  </head>
  <body>
    <h2>Bank AI BFF — D14 Auth 測試頁</h2>

    <!-- ========= Step 1: 登入 ========= -->
    <div class="label">Step 1: 使用 Google 帳號登入</div>
    <button id="btn-login">Sign in with Google</button>
    <button id="btn-logout" style="display: none">Logout</button>
    <div id="user-info"></div>

    <!-- ========= Step 2: 查看 Token ========= -->
    <div class="label">Step 2: 查看 ID Token（帶到 BFF 的那個）</div>
    <button id="btn-token">取得 ID Token</button>
    <pre id="token-display"></pre>

    <!-- ========= Step 3: 打 BFF ========= -->
    <div class="label">Step 3: 打 BFF /query</div>
    <div>
      BFF URL:
      <input id="bff-url" value="http://localhost:8080" style="width: 300px" />
    </div>
    <textarea
      id="question"
      placeholder="輸入問題，例如：OWASP SQL Injection 怎麼防範？"
    ></textarea>
    <button id="btn-query">送出 /query</button>
    <pre id="response-display"></pre>

    <!-- ========= Firebase SDK (compat 版，支援 CDN) ========= -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <!-- Firebase 設定從 config.js 載入（已加入 .gitignore，請參考 config.example.js） -->
    <script src="config.js"></script>
    <script>
      firebase.initializeApp(window.FIREBASE_CONFIG);
      const auth = firebase.auth();
      const provider = new firebase.auth.GoogleAuthProvider();

      // ── UI refs ──
      const userInfo = document.getElementById("user-info");
      const tokenEl = document.getElementById("token-display");
      const responseEl = document.getElementById("response-display");
      const btnLogin = document.getElementById("btn-login");
      const btnLogout = document.getElementById("btn-logout");

      // ── Auth state ──
      auth.onAuthStateChanged((user) => {
        if (user) {
          userInfo.innerHTML = `<span class="ok">✅ 已登入：${user.email}</span>`;
          btnLogin.style.display = "none";
          btnLogout.style.display = "";
        } else {
          userInfo.innerHTML = `<span class="err">❌ 未登入</span>`;
          btnLogin.style.display = "";
          btnLogout.style.display = "none";
        }
      });

      // ── Login ──
      btnLogin.addEventListener("click", () => {
        auth.signInWithPopup(provider).catch((e) => alert(e.message));
      });

      // ── Logout ──
      btnLogout.addEventListener("click", () => auth.signOut());

      // ── Get Token ──
      document
        .getElementById("btn-token")
        .addEventListener("click", async () => {
          const user = auth.currentUser;
          if (!user) {
            tokenEl.textContent = "尚未登入";
            return;
          }
          const token = await user.getIdToken(/* forceRefresh= */ true);
          tokenEl.textContent = token;
        });

      // ── Query BFF ──
      document
        .getElementById("btn-query")
        .addEventListener("click", async () => {
          const user = auth.currentUser;
          if (!user) {
            responseEl.textContent = "尚未登入";
            return;
          }

          const bffUrl = document
            .getElementById("bff-url")
            .value.replace(/\/$/, "");
          const question = document.getElementById("question").value;
          const token = await user.getIdToken(true);

          responseEl.textContent = "⏳ 送出中...";
          try {
            const res = await fetch(`${bffUrl}/query`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
              },
              body: JSON.stringify({ question }),
            });
            const data = await res.json();
            responseEl.textContent =
              `HTTP ${res.status}\n\n` + JSON.stringify(data, null, 2);
          } catch (e) {
            responseEl.textContent = `Error: ${e.message}`;
          }
        });
    </script>
  </body>
</html>
